---
layout: default
title: Pesquisa
search: false
---
<div class="search-page-wrapper">
  <form onsubmit="return false;" class="search-form-group">
    <label for="search-input" class="search-label">Pesquisar no site</label>
    <div class="search-input-wrapper">
      <span class="search-input-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Digite os termos para pesquisar..." autocomplete="off" />
    </div>
  </form>

  <ul id="results-container"></ul>

  <a href="{{ '/' | relative_url }}" class="search-back-btn">← Início do Microblog</a>
</div>

<script src="https://unpkg.com/simple-jekyll-search@latest/dest/simple-jekyll-search.min.js"></script>
<script>
  fetch('{{ "/search.json" | relative_url }}')
    .then(response => response.json())
    .then(json => {
      const filteredJson = json.filter(item => !item.url.endsWith('/'));
      const searchInput = document.getElementById('search-input');
      
      window.simpleJekyllSearch = new SimpleJekyllSearch({
        searchInput: searchInput,
        resultsContainer: document.getElementById('results-container'),
        json: filteredJson,
        searchResultTemplate: '<li><a href="{url}"><span>{title}</span> <span class="search-reading-time">{reading_time} min de leitura</span></a></li>',
        noResultsText: '<li class="no-results">Nenhum resultado encontrado</li>',
        minimumLength: 2,
        stopWords: '',
        limit: 100,
        searchFields: ['title', 'content'],
      });

      // Checa se há parâmetros de busca na URL (ex: ?q=minha_busca)
      const urlParams = new URLSearchParams(window.location.search);
      const query = urlParams.get('q');
      if (query && searchInput) {
        searchInput.value = query;
        // Dispara o evento 'input' para rodar a pesquisa imediatamente após carregar
        setTimeout(() => {
          searchInput.dispatchEvent(new Event('input', { bubbles: true }));
        }, 100);
      }
    });
</script>
