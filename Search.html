---
layout: default
title: Pesquisa
search: false
---
<form onsubmit="return false;">
  <label for="search-input">Pesquisa:</label>
  <input type="text" id="search-input" placeholder="Digite os termos..." />
</form>
<ul id="results-container"></ul>
<script src="https://unpkg.com/simple-jekyll-search@latest/dest/simple-jekyll-search.min.js"></script>
<script>
  fetch('{{ "/search.json" | relative_url }}')
    .then(response => response.json())
    .then(json => {
      const filteredJson = json.filter(item => !item.url.endsWith('/'));
      const searchInput = document.getElementById('search-input');
      
      window.simpleJekyllSearch = new SimpleJekyllSearch({
        searchInput: searchInput,
        resultsContainer: document.getElementById('results-container'),
        json: filteredJson,
        searchResultTemplate: '<li><a href="{url}">{title} ({reading_time} min)</a></li>', // O template para cada resultado
        noResultsText: '<li>Nenhum resultado encontrado</li>', // Mensagem para quando não há resultados
        minimumLength: 2, // Permitir buscas com 2 ou mais caracteres
        stopWords: '', // Desabilitar a lista de palavras a serem ignoradas
        limit: 100,
        searchFields: ['title', 'content'], // Define os campos a serem pesquisados
      });

      // Checa se há parâmetros de busca na URL (ex: ?q=minha_busca)
      const urlParams = new URLSearchParams(window.location.search);
      const query = urlParams.get('q');
      if (query && searchInput) {
        searchInput.value = query;
        // Dispara o evento 'input' para rodar a pesquisa imediatamente após carregar
        setTimeout(() => {
          searchInput.dispatchEvent(new Event('input', { bubbles: true }));
        }, 100);
      }
    });
</script>
