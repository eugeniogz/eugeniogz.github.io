<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}" media="screen" type="text/css">
    <link rel="stylesheet" href="{{ '/assets/css/print.css' | relative_url }}" media="print" type="text/css">
    <link rel="stylesheet" href="{{ '/css/override.css' | relative_url }}" media="screen" type="text/css">
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
    <link rel="icon" type="image/svg+xml" href="/wingene-simplified.svg">
    <!--[if lt IE 9]>
    <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
    <![endif]-->

{% seo %}

    {% include head-custom.html %}
    
  </head>

  <body>
    <header style="height: auto;">
      <div class="inner" style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;">
        <div style="display: flex; align-items: center;">
          <a href="{{ '/geometria/geometria-e-o-metodo-vida.html' | relative_url }}" style="margin-right: 1rem; text-decoration: none;">
            <img src="{{ '/wingene-animated.gif' | relative_url }}" alt="Wingene Logo, polígono regular de 12 vértices (12/5- vermelho (a herança ancestral)) e estrelas geradas com (12/4 - verde,12/3- amarelo e 12/2- azul (o espírito material), 4 cores, 4 pilares do método VIDA)" style="height: 5rem; width: auto;"/>
          </a>
          <div style="display: flex; flex-direction: column; justify-content: center;">
            <a href="{{ '/' | relative_url }}">
              <h1 style="margin: 0; line-height: 1.2;">{{ site.title | default: site.github.repository_name }}</h1>
            </a>
            <h2 style="margin: 0; line-height: 1.2;">{{ site.description | default: site.github.project_tagline }}</h2>
          </div>
        </div>
      </div>
    </header>

    <div id="content-wrapper">
      <div class="inner clearfix">
        <section id="main-content">
          {{ content }}
        </section>
      </div>
    </div>

  </body>
</html>
